<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0a0a0a;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
        }
        .me {
            align-self: flex-end;
            background: #667eea;
            border-bottom-right-radius: 4px;
        }
        .other {
            align-self: flex-start;
            background: #2a2a2a;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            background: #1a1a1a;
            padding: 12px;
            border-top: 1px solid #333;
        }
        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }
        button {
            margin-top: 8px;
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <h2>🌍 Global Chat</h2>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="message-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
        <button onclick="window.location.href='home.html'">← Back to Home</button>
    </div>

    <script>
    const API = "https://legendpotato.onrender.com";
    let username = "";
    let socket = null;

    function loadUser() {
        const user = localStorage.getItem("currentUser");
        if (!user) return window.location.href = "index.html";
        username = JSON.parse(user).username;
    }

    function connectWebSocket() {
        socket = new WebSocket(`wss://legendpotato.onrender.com/ws/${username}`);
        
        socket.onmessage = function(event) {
            const messagesDiv = document.getElementById("messages");
            const text = event.data;
            const match = text.match(/\[(.+?)\]:/);
            const sender = match ? match[1] : "Unknown";
            const msgText = text.replace(/\[.+?\]: /, "");

            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender === username ? 'me' : 'other'}`;
            msgDiv.textContent = msgText;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        };
    }

    function sendMessage() {
        const input = document.getElementById("message-input");
        if (input.value.trim() && socket) {
            socket.send(input.value.trim());
            input.value = "";
        }
    }

    window.onload = () => {
        loadUser();
        connectWebSocket();
    };
    </script>
</body>
</html>
