<!DOCTYPE html>
<html>
<head>
    <title>Test Auth</title>
</head>
<body>
    <h2>Register</h2>
    <input id="reg-username" placeholder="Username" style="margin:5px;padding:8px;">
    <input id="reg-password" type="password" placeholder="Password" style="margin:5px;padding:8px;">
    <button onclick="register()" style="padding:8px 16px;">Register</button>

    <br><br>
    <h2>Login</h2>
    <input id="login-username" placeholder="Username" style="margin:5px;padding:8px;">
    <input id="login-password" type="password" placeholder="Password" style="margin:5px;padding:8px;">
    <button onclick="login()" style="padding:8px 16px;">Login</button>

    <pre id="result" style="margin-top:20px; background:#f0f0f0; padding:10px;"></pre>

    <script>
    const API = "https://legendpotato.onrender.com";   // Make sure this is your exact Render URL

    async function register() {
        const username = document.getElementById("reg-username").value;
        const password = document.getElementById("reg-password").value;
        
        const res = await fetch(API + "/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, password})
        });
        const text = await res.text();
        document.getElementById("result").textContent = "Register: " + text;
    }

    async function login() {
        const username = document.getElementById("login-username").value;
        const password = document.getElementById("login-password").value;
        
        const res = await fetch(API + "/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, password})
        });
        const text = await res.text();
        document.getElementById("result").textContent = "Login: " + text;
    }
    </script>
</body>
</html>
