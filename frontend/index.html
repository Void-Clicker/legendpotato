<!DOCTYPE html>
<html>
<head>
    <title>Social App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .header {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        .welcome {
            text-align: center;
            margin-bottom: 30px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }
        .menu-btn {
            background: white;
            border: none;
            padding: 25px 15px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .logout {
            margin-top: 40px;
            background: #ff6666;
            color: white;
        }
        #username-display {
            font-size: 22px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>My Social App</h1>
    </div>

    <div class="container">
        <div class="welcome">
            <h2>Welcome back, <span id="username-display"></span>!</h2>
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="goTo('chat')">💬 Messages</button>
            <button class="menu-btn" onclick="goTo('shorts')">📱 Shorts</button>
            <button class="menu-btn" onclick="goTo('profile')">👤 Profile</button>
            <button class="menu-btn" onclick="goTo('friends')">👥 Friends</button>
        </div>

        <button class="menu-btn logout" onclick="logout()" style="width:100%;">Logout</button>
    </div>

    <script>
    const API = "https://legendpotato.onrender.com";

    // Check if user is logged in
    function checkLogin() {
        const user = localStorage.getItem("currentUser");
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        
        const userData = JSON.parse(user);
        document.getElementById("username-display").textContent = userData.username || "User";
    }

    function goTo(page) {
        alert(`🚧 ${page.charAt(0).toUpperCase() + page.slice(1)} page is coming soon!`);
        // Later we'll link to chat.html, shorts.html, etc.
    }

    function logout() {
        if (confirm("Are you sure you want to logout?")) {
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }
    }

    // Run when page loads
    window.onload = checkLogin;
    </script>
</body>
</html>
