<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>👤 Edit Profile</h2>
        
        <label>Display Name</label>
        <input id="display_name" placeholder="Your display name">

        <label>Handle (@username)</label>
        <input id="handle" placeholder="@yourhandle">

        <label>Bio</label>
        <textarea id="bio" rows="4" placeholder="Write something about yourself..."></textarea>

        <button onclick="saveProfile()">Save Profile</button>
        <button onclick="window.location.href='home.html'" style="background:#666;">Back to Home</button>
    </div>

    <script>
    const API = "https://legendpotato.onrender.com";
    let currentUser = "";

    async function loadProfile() {
        const user = localStorage.getItem("currentUser");
        if (!user) return window.location.href = "index.html";
        
        currentUser = JSON.parse(user).username;

        try {
            const res = await fetch(`${API}/profile/${currentUser}`);
            const data = await res.json();
            
            document.getElementById("display_name").value = data.display_name || "";
            document.getElementById("handle").value = data.handle || "";
            document.getElementById("bio").value = data.bio || "";
        } catch(e) {}
    }

    async function saveProfile() {
        const display_name = document.getElementById("display_name").value;
        const handle = document.getElementById("handle").value;
        const bio = document.getElementById("bio").value;

        try {
            await fetch(`${API}/update-profile/${currentUser}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ display_name, handle, bio })
            });
            alert("✅ Profile updated successfully!");
        } catch(err) {
            alert("Failed to save profile");
        }
    }

    window.onload = loadProfile;
    </script>
</body>
</html>
